<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="StuntingCare membantu orang tua melakukan skrining awal risiko stunting secara mudah dan nyaman.">
    <meta name="theme-color" content="#198754">
    <title>{{ page_title or 'StuntingCare' }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <a class="skip-link" href="#main-content">Lewati ke konten utama</a>
    <nav class="navbar navbar-expand-lg fixed-top app-navbar" aria-label="Navigasi utama">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('home') }}" aria-label="StuntingCare, kembali ke Home">
                <span class="brand-icon" aria-hidden="true"><i class="bi bi-heart-pulse-fill"></i></span>
                <span>Stunting<span>Care</span></span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Buka menu navigasi">
                <i class="bi bi-list fs-2" aria-hidden="true"></i>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                    <li class="nav-item"><a class="nav-link {{ 'active' if request.endpoint == 'home' }}" href="{{ url_for('home') }}" {% if request.endpoint == 'home' %}aria-current="page"{% endif %}>Home</a></li>
                    <li class="nav-item"><a class="nav-link {{ 'active' if request.endpoint == 'method' }}" href="{{ url_for('method') }}" {% if request.endpoint == 'method' %}aria-current="page"{% endif %}>Metode</a></li>
                    <li class="nav-item"><a class="nav-link {{ 'active' if request.endpoint == 'about' }}" href="{{ url_for('about') }}" {% if request.endpoint == 'about' %}aria-current="page"{% endif %}>Tentang</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main id="main-content">{% block content %}{% endblock %}</main>

    <footer class="app-footer">
        <div class="container footer-main">
            <div class="footer-brand">
                <a class="navbar-brand" href="{{ url_for('home') }}">
                    <span class="brand-icon" aria-hidden="true"><i class="bi bi-heart-pulse-fill"></i></span>
                    <span>Stunting<span>Care</span></span>
                </a>
                <p>Skrining Awal Risiko Stunting</p>
            </div>
            <div class="footer-meta">
                <span>Universitas Muhammadiyah Semarang</span>
                <span>2026</span>
            </div>
        </div>
    </footer>

    <div class="app-toast-stack" aria-live="polite" aria-atomic="true" data-toast-stack></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
